apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-website-deployment
  labels:
    app: abc-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-website
  template:
    metadata:
      labels:
        app: abc-website
    spec:
      containers:
        - name: abc-website
          image: abc-corporate-website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"