define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Corporate Website Host
    address                 host.docker.internal
    check_command           check_tcp!30080
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP
    check_command           check_http!-p 30080
    max_check_attempts      5
    check_interval          1
    retry_interval          1
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     PORT_CHECK
    check_command           check_tcp!30080
    max_check_attempts      5
    check_interval          5
    retry_interval          1
}